<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Pilares de Jalisco">
<title>Mariachi Pilares de Jalisco</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#f0e6c8;min-height:100vh}
  .header{background:linear-gradient(180deg,#000 0%,#1a0e00 100%);padding:2rem 1rem 1.5rem;text-align:center;border-bottom:1px solid #8B6914}
  .logo{width:90px;height:90px;border-radius:50%;margin:0 auto 0.75rem;border:2px solid #c8860a;object-fit:cover}
  .header h1{font-size:18px;font-weight:600;color:#F0C060;letter-spacing:0.05em;margin-bottom:3px}
  .header p{font-size:12px;color:#8a7a5a}
  .ig-btn{display:inline-flex;align-items:center;gap:6px;margin-top:0.75rem;padding:6px 16px;border-radius:20px;border:1px solid #8B6914;color:#F0C060;font-size:12px;text-decoration:none;background:transparent}
  .ig-btn svg{width:14px;height:14px;fill:#F0C060}
  .content{padding:1rem}
  .search-wrap{position:relative;margin-bottom:0.75rem}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8a7a5a;width:16px;height:16px}
  .search-wrap input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:1px solid #3a2a10;background:#1a1208;color:#f0e6c8;font-size:14px}
  .search-wrap input::placeholder{color:#5a4a30}
  .filters{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid #3a2a10;background:#1a1208;color:#8a7a5a;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s}
  .chip.active{background:#3d1a00;border-color:#c8860a;color:#F0C060}
  .section-label{font-size:10px;letter-spacing:0.1em;color:#5a4a30;text-transform:uppercase;padding:0.75rem 0 0.25rem}
  .song{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1e1608}
  .song:last-child{border-bottom:none}
  .num{width:22px;text-align:right;font-size:11px;color:#5a4a30;flex-shrink:0}
  .info{flex:1;min-width:0}
  .name{font-size:13px;font-weight:500;color:#f0e6c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .singer{font-size:11px;color:#8a7a5a}
  .tag{font-size:10px;padding:2px 7px;border-radius:10px;flex-shrink:0}
  .t-ranchera{background:#2a0a00;color:#E07040;border:1px solid #6B2810}
  .t-bolero{background:#1a0a2a;color:#A080E0;border:1px solid #5a3a8a}
  .t-son{background:#0a1a0a;color:#60A060;border:1px solid #2a5a2a}
  .t-cumbia{background:#1a1a00;color:#C0A020;border:1px solid #6a5a10}
  .t-vals{background:#00101a;color:#4090B0;border:1px solid #104060}
  .t-arpa{background:#1a0a1a;color:#B060B0;border:1px solid #5a205a}
  .t-pop{background:#001a10;color:#40B080;border:1px solid #105040}
  .t-otro{background:#101010;color:#808080;border:1px solid #303030}
  .empty{text-align:center;padding:2rem;color:#5a4a30;font-size:13px}
  .footer{text-align:center;padding:1.25rem 1rem 2rem;font-size:11px;color:#5a4a30;line-height:1.6;border-top:1px solid #1e1608;margin-top:0.5rem}
  .footer a{color:#8B6914;text-decoration:none}
  .count-badge{display:inline-block;background:#1a0e00;border:1px solid #3a2a10;color:#8a7a5a;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
</style>
</head>

const genreLabel={ranchera:"Ranchera",bolero:"Bolero",son:"Son",cumbia:"Cumbia",vals:"Vals",arpa:"Arpa",pop:"Pop"};
const genreClass={ranchera:"t-ranchera",bolero:"t-bolero",son:"t-son",cumbia:"t-cumbia",vals:"t-vals",arpa:"t-arpa",pop:"t-pop"};
const filters=["Todas","Ranchera","Bolero","Son","Cumbia","Vals","Arpa","Pop"];
let active="Todas";

function init(){
  const c=document.getElementById("chips");
  filters.forEach(f=>{
    const d=document.createElement("div");
    d.className="chip"+(f==="Todas"?" active":"");
    d.textContent=f;
    d.onclick=()=>{active=f;document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));d.classList.add("active");render();};
    c.appendChild(d);
  });
  render();
}

function render(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  const filtered=songs.filter(s=>{
    const gMatch=active==="Todas"||s.g===active.toLowerCase();
    const qMatch=!q||s.n.toLowerCase().includes(q)||s.s.toLowerCase().includes(q);
    return gMatch&&qMatch;
  });
  const list=document.getElementById("list");
  if(!filtered.length){list.innerHTML='<div class="empty">No encontramos esa canción<br><small>Pregunta directamente al mariachi</small></div>';return;}
  list.innerHTML=filtered.map((s,i)=>`
    <div class="song">
      <div class="num">${i+1}</div>
      <div class="info">
        <div class="name">${s.n}</div>
        <div class="singer">${s.s}</div>
      </div>
      <div class="tag ${genreClass[s.g]||'t-otro'}">${genreLabel[s.g]||s.g}</div>
    </div>`).join("");
}

init();

  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
